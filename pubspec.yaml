name: craft_app
description: CRAFT - Complete Resource and File Toolkit. All-in-one offline file manager with professional tools.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  provider: ^6.1.1
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2

  file_picker: ^11.0.0
  path: ^1.8.3

  sqflite: ^2.3.0

  share_plus: ^7.2.1
  qr_flutter: ^4.1.0

  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0
  flutter_slidable: ^3.0.1
  flutter_markdown: ^0.7.6

  intl: 0.20.2
  archive: ^3.4.9
  vector_math: ^2.1.4

  image: ^4.1.3
  video_player: ^2.8.1
  just_audio: ^0.9.36
  pdf: ^3.12.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  sqflite_common_ffi: ^2.4.2

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
